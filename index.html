<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>BMW Sales Dashboard</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.header{
font-size:28px;
text-align:center;
padding:25px;
}

.filters{
display:flex;
gap:20px;
justify-content:center;
padding:15px;
}

select{
padding:6px;
border-radius:6px;
}

.kpis{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:20px;
}

.kpi{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
}

.kpi-value{
font-size:26px;
margin-top:10px;
font-weight:bold;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
}

.full{
grid-column:span 2;
}

</style>

</head>

<body>

<div class="header">BMW Global Sales Dashboard</div>

<div class="filters">

<select id="year"></select>
<select id="region"></select>
<select id="model"></select>

</div>

<div class="kpis">

<div class="kpi">
Units Sold
<div id="units" class="kpi-value"></div>
</div>

<div class="kpi">
Revenue
<div id="revenue" class="kpi-value"></div>
</div>

<div class="kpi">
Avg Price
<div id="price" class="kpi-value"></div>
</div>

<div class="kpi">
BEV Share
<div id="bev" class="kpi-value"></div>
</div>

</div>

<div class="container">

<div class="card full">
<div id="salesTrend"></div>
</div>

<div class="card">
<div id="regional"></div>
</div>

<div class="card">
<div id="models"></div>
</div>

</div>

<script>

let dataset=[]

Papa.parse("../bmw_global_sales_2018_2025.csv",{

download:true,
header:true,

complete:function(res){

dataset=res.data.filter(d=>d.Year)

initFilters()
update()

}

})

function initFilters(){

let years=[...new Set(dataset.map(d=>d.Year))]
let regions=[...new Set(dataset.map(d=>d.Region))]
let models=[...new Set(dataset.map(d=>d.Model))]

populate("year",years)
populate("region",regions)
populate("model",models)

document.querySelectorAll("select")
.forEach(el=>el.addEventListener("change",update))

}

function populate(id,values){

let el=document.getElementById(id)

el.innerHTML="<option value='all'>All</option>"

values.forEach(v=>{

let opt=document.createElement("option")
opt.value=v
opt.text=v

el.appendChild(opt)

})

}

function getFiltered(){

let y=document.getElementById("year").value
let r=document.getElementById("region").value
let m=document.getElementById("model").value

return dataset.filter(d=>

(y==="all"||d.Year===y)&&
(r==="all"||d.Region===r)&&
(m==="all"||d.Model===m)

)

}

function update(){

let data=getFiltered()

updateKPI(data)
salesTrend(data)
regional(data)
models(data)

}

function updateKPI(data){

let units=data.reduce((a,b)=>a+(+b.Units_Sold||0),0)

let revenue=data.reduce((a,b)=>a+(+b.Revenue_EUR||0),0)

let avgPrice=data.reduce((a,b)=>a+(+b.Avg_Price_EUR||0),0)/data.length

let bev=data.reduce((a,b)=>a+(+b.BEV_Share||0),0)/data.length

document.getElementById("units").innerText=units.toLocaleString()

document.getElementById("revenue").innerText=Math.round(revenue/1000000)+" M"

document.getElementById("price").innerText=Math.round(avgPrice)

document.getElementById("bev").innerText=bev.toFixed(2)+" %"

}

function salesTrend(data){

let map={}

data.forEach(d=>{

map[d.Year]=(map[d.Year]||0)+(+d.Units_Sold||0)

})

Plotly.newPlot("salesTrend",[{

x:Object.keys(map),
y:Object.values(map),
type:"scatter",
mode:"lines+markers"

}],{title:"Sales Trend"})

}

function regional(data){

let map={}

data.forEach(d=>{

map[d.Region]=(map[d.Region]||0)+(+d.Units_Sold||0)

})

Plotly.newPlot("regional",[{

x:Object.keys(map),
y:Object.values(map),
type:"bar"

}],{title:"Regional Sales"})

}

function models(data){

let map={}

data.forEach(d=>{

map[d.Model]=(map[d.Model]||0)+(+d.Units_Sold||0)

})

let sorted=Object.entries(map)
.sort((a,b)=>b[1]-a[1])
.slice(0,10)

Plotly.newPlot("models",[{

x:sorted.map(d=>d[0]),
y:sorted.map(d=>d[1]),
type:"bar"

}],{title:"Top Models"})

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>BMW Global Sales Dashboard</title>

<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
margin:0;
font-family:Inter,Segoe UI;
background:#0f172a;
color:white;
}

.header{
text-align:center;
font-size:30px;
padding:25px;
font-weight:600;
}

.controls{
display:flex;
justify-content:center;
gap:20px;
padding:10px;
}

select{
padding:6px;
border-radius:6px;
border:none;
}

.slider{
text-align:center;
padding:15px;
}

.kpis{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:20px;
}

.kpi{
background:linear-gradient(145deg,#1e293b,#020617);
border-radius:14px;
padding:20px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.7);
}

.kpi-value{
font-size:30px;
font-weight:700;
}

.kpi-growth{
font-size:15px;
margin-top:6px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.card{
background:#1e293b;
border-radius:12px;
padding:15px;
}

.full{
grid-column:span 2;
}

</style>

</head>

<body>

<div class="header">BMW Global Sales Analytics</div>

<div class="controls">

<select id="regionFilter"></select>
<select id="modelFilter"></select>

</div>

<div class="slider">

Year

<input type="range"
id="yearSlider"
min="2018"
max="2025"
value="2025">

<span id="yearLabel">2025</span>

</div>

<div class="kpis">

<div class="kpi">
Units Sold
<div id="units" class="kpi-value"></div>
<div id="unitsGrowth" class="kpi-growth"></div>
</div>

<div class="kpi">
Revenue
<div id="revenue" class="kpi-value"></div>
<div id="revenueGrowth" class="kpi-growth"></div>
</div>

<div class="kpi">
Avg Price
<div id="price" class="kpi-value"></div>
<div id="priceGrowth" class="kpi-growth"></div>
</div>

<div class="kpi">
BEV Share
<div id="bev" class="kpi-value"></div>
<div id="bevGrowth" class="kpi-growth"></div>
</div>

</div>

<div class="container">

<div class="card full">
<div id="map"></div>
</div>

<div class="card">
<div id="salesTrend"></div>
</div>

<div class="card">
<div id="bevChart"></div>
</div>

<div class="card">
<div id="regional"></div>
</div>

<div class="card">
<div id="models"></div>
</div>

<div class="card full">

<h3>Key Insights</h3>

<ul id="insights"></ul>

</div>

<script>

let dataset=[]

Papa.parse("bmw_global_sales_2018_2025.csv",{

download:true,
header:true,

complete:function(res){

dataset=res.data.filter(d=>d.Year)

initFilters()
updateDashboard()

}

})

function initFilters(){

let regions=[...new Set(dataset.map(d=>d.Region))]
let models=[...new Set(dataset.map(d=>d.Model))]

populate("regionFilter",regions)
populate("modelFilter",models)

document.querySelectorAll("select")
.forEach(el=>el.addEventListener("change",updateDashboard))

yearSlider.oninput=function(){

yearLabel.innerText=this.value
updateDashboard()

}

}

function populate(id,values){

let el=document.getElementById(id)

el.innerHTML="<option value='all'>All</option>"

values.forEach(v=>{

let opt=document.createElement("option")
opt.value=v
opt.text=v

el.appendChild(opt)

})

}

function filterData(){

let year=yearSlider.value
let region=regionFilter.value
let model=modelFilter.value

return dataset.filter(d=>

d.Year<=year &&
(region==="all"||d.Region===region) &&
(model==="all"||d.Model===model)

)

}

function growthColor(v){

return v>=0 ? "#22c55e" : "#ef4444"

}

function computeGrowth(current,previous){

if(previous===0) return {text:"",value:0}

let g=((current-previous)/previous)*100

let arrow=g>=0?"▲":"▼"

return {text:arrow+" "+g.toFixed(1)+"%",value:g}

}

function updateKPI(data){

let unitsEl=document.getElementById("units")
let revenueEl=document.getElementById("revenue")
let priceEl=document.getElementById("price")
let bevEl=document.getElementById("bev")

let year=yearSlider.value

let current=data.filter(d=>d.Year==year)
let prev=data.filter(d=>d.Year==year-1)

function sum(arr,col){

return arr.reduce((a,b)=>a+(+b[col]||0),0)

}

let units=sum(current,"Units_Sold")
let unitsPrev=sum(prev,"Units_Sold")

let revenue=sum(current,"Revenue_EUR")
let revenuePrev=sum(prev,"Revenue_EUR")

let price=sum(current,"Avg_Price_EUR")/current.length
let pricePrev=sum(prev,"Avg_Price_EUR")/prev.length

let bev=sum(current,"BEV_Share")/current.length
let bevPrev=sum(prev,"BEV_Share")/prev.length

unitsEl.innerText=units.toLocaleString()
revenueEl.innerText=Math.round(revenue/1e9)+"B"
priceEl.innerText=Math.round(price)
bevEl.innerText=bev.toFixed(1)+"%"

let g1=computeGrowth(units,unitsPrev)
unitsGrowth.innerText=g1.text
unitsGrowth.style.color=growthColor(g1.value)

let g2=computeGrowth(revenue,revenuePrev)
revenueGrowth.innerText=g2.text
revenueGrowth.style.color=growthColor(g2.value)

let g3=computeGrowth(price,pricePrev)
priceGrowth.innerText=g3.text
priceGrowth.style.color=growthColor(g3.value)

let g4=computeGrowth(bev,bevPrev)
bevGrowth.innerText=g4.text
bevGrowth.style.color=growthColor(g4.value)

}

function salesTrend(data){

let map={}

data.forEach(d=>{

map[d.Year]=(map[d.Year]||0)+(+d.Units_Sold)

})

Plotly.newPlot("salesTrend",[{

x:Object.keys(map),
y:Object.values(map),
mode:"lines+markers",
line:{width:4,color:"#38bdf8"}

}],

{title:"Sales Trend",paper_bgcolor:"#1e293b",plot_bgcolor:"#1e293b",font:{color:"white"}})

}

function bevChart(data){

let years=[...new Set(data.map(d=>d.Year))]

let bevPerYear=years.map(y=>{

let arr=data.filter(d=>d.Year==y)

let avg=arr.reduce((a,b)=>a+(+b.BEV_Share),0)/arr.length

return avg

})

let frames=years.map((y,i)=>({

name:y,

data:[{

x:years.slice(0,i+1),

y:bevPerYear.slice(0,i+1),

mode:"lines+markers"

}]

}))

Plotly.newPlot("bevChart",[{

x:[years[0]],

y:[bevPerYear[0]],

mode:"lines+markers",

line:{width:4,color:"#22c55e"}

}],

{

title:"EV Adoption Growth",

paper_bgcolor:"#1e293b",
plot_bgcolor:"#1e293b",
font:{color:"white"},

updatemenus:[{

type:"buttons",

buttons:[{

label:"Play",

method:"animate",

args:[null]

}]

}]

},

{frames:frames}

)

}

function regional(data){

let map={}

data.forEach(d=>{

map[d.Region]=(map[d.Region]||0)+(+d.Units_Sold)

})

Plotly.newPlot("regional",[{

x:Object.keys(map),
y:Object.values(map),
type:"bar",
marker:{color:"#f59e0b"}

}],

{title:"Regional Sales",paper_bgcolor:"#1e293b",plot_bgcolor:"#1e293b",font:{color:"white"}})

}

function models(data){

let map={}

data.forEach(d=>{

map[d.Model]=(map[d.Model]||0)+(+d.Units_Sold)

})

let sorted=Object.entries(map)
.sort((a,b)=>b[1]-a[1])
.slice(0,10)

Plotly.newPlot("models",[{

x:sorted.map(d=>d[0]),
y:sorted.map(d=>d[1]),
type:"bar",
marker:{color:"#6366f1"}

}],

{title:"Top Models",paper_bgcolor:"#1e293b",plot_bgcolor:"#1e293b",font:{color:"white"}})

}

function worldMap(data){

let map={}

data.forEach(d=>{

map[d.Region]=(map[d.Region]||0)+(+d.Units_Sold)

})

Plotly.newPlot("map",[{

type:"choropleth",

locations:Object.keys(map),

locationmode:"continent names",

z:Object.values(map),

colorscale:"Blues",

colorbar:{title:"Units Sold"}

}],

{
title:"BMW Global Sales by Region",
paper_bgcolor:"#1e293b",
font:{color:"white"}
})

}
function generateInsights(data){

let insights=[]

let total=data.reduce((a,b)=>a+(+b.Units_Sold),0)

let topRegion={}

data.forEach(d=>{
topRegion[d.Region]=(topRegion[d.Region]||0)+(+d.Units_Sold)
})

let bestRegion=Object.entries(topRegion)
.sort((a,b)=>b[1]-a[1])[0][0]

insights.push(
"Top market: "+bestRegion
)

let bevAvg=data.reduce((a,b)=>a+(+b.BEV_Share),0)/data.length

if(bevAvg>20)
insights.push("EV adoption accelerating across BMW markets")

if(total>2000000)
insights.push("Global demand remains strong")

let list=document.getElementById("insights")

list.innerHTML=""

insights.forEach(i=>{

let li=document.createElement("li")
li.innerText=i

list.appendChild(li)

})

}
function updateDashboard(){

   let data = filterData()

   updateKPI(data)
   salesTrend(data)
   bevChart(data)
   regional(data)
   models(data)
   worldMap(data)

   generateInsights(data)

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>BMW Global Sales Dashboard</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:0;
}

.header{
padding:30px;
font-size:28px;
text-align:center;
font-weight:600;
}

.filters{
display:flex;
gap:20px;
padding:20px;
justify-content:center;
}

select{
padding:8px;
border-radius:6px;
border:none;
}

.kpi-container{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:20px;
}

.kpi{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.kpi-value{
font-size:28px;
font-weight:700;
margin-top:10px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
}

.full{
grid-column:span 2;
}

</style>

</head>

<body>

<div class="header">
BMW Global Sales Dashboard
</div>

<div class="filters">

<select id="yearFilter"></select>
<select id="regionFilter"></select>
<select id="modelFilter"></select>

</div>

<div class="kpi-container">

<div class="kpi">
Total Units Sold
<div id="kpiUnits" class="kpi-value"></div>
</div>

<div class="kpi">
Total Revenue (€)
<div id="kpiRevenue" class="kpi-value"></div>
</div>

<div class="kpi">
Average Price (€)
<div id="kpiPrice" class="kpi-value"></div>
</div>

<div class="kpi">
Average BEV Share
<div id="kpiBev" class="kpi-value"></div>
</div>

</div>

<div class="container">

<div class="card full">
<div id="salesTrend"></div>
</div>

<div class="card">
<div id="regionalSales"></div>
</div>

<div class="card">
<div id="topModels"></div>
</div>

</div>

<script>

let rawData=[]

Papa.parse("../bmw_global_sales_2018_2025.csv",{

download:true,
header:true,

complete:function(results){

rawData=results.data

initFilters()
updateDashboard()

}

})

function initFilters(){

let years=[...new Set(rawData.map(d=>d.Year))]
let regions=[...new Set(rawData.map(d=>d.Region))]
let models=[...new Set(rawData.map(d=>d.Model))]

fillSelect("yearFilter",years)
fillSelect("regionFilter",regions)
fillSelect("modelFilter",models)

document.querySelectorAll("select")
.forEach(s=>s.addEventListener("change",updateDashboard))

}

function fillSelect(id,values){

let select=document.getElementById(id)

select.innerHTML="<option value='all'>All</option>"

values.forEach(v=>{
let option=document.createElement("option")
option.value=v
option.text=v
select.appendChild(option)
})

}

function filterData(){

let year=document.getElementById("yearFilter").value
let region=document.getElementById("regionFilter").value
let model=document.getElementById("modelFilter").value

return rawData.filter(d=>{

return (year==="all" || d.Year===year) &&
(region==="all" || d.Region===region) &&
(model==="all" || d.Model===model)

})

}

function updateDashboard(){

let data=filterData()

updateKPI(data)
salesTrend(data)
regionalSales(data)
topModels(data)

}

function updateKPI(data){

let units=data.reduce((a,b)=>a+Number(b.Units_Sold),0)

let revenue=data.reduce((a,b)=>a+Number(b.Revenue_EUR),0)

let avgPrice=data.reduce((a,b)=>a+Number(b.Avg_Price_EUR),0)/data.length

let bev=data.reduce((a,b)=>a+Number(b.BEV_Share),0)/data.length

document.getElementById("kpiUnits").innerText=units.toLocaleString()

document.getElementById("kpiRevenue").innerText=Math.round(revenue/1000000)+" M"

document.getElementById("kpiPrice").innerText=Math.round(avgPrice).toLocaleString()

document.getElementById("kpiBev").innerText=bev.toFixed(2)+" %"

}

function salesTrend(data){

let yearly={}

data.forEach(d=>{

if(!yearly[d.Year]) yearly[d.Year]=0
yearly[d.Year]+=Number(d.Units_Sold)

})

Plotly.newPlot("salesTrend",[{

x:Object.keys(yearly),
y:Object.values(yearly),
type:"scatter",
mode:"lines+markers",
line:{width:4}

}],{title:"Global Sales Trend"})

}

function regionalSales(data){

let regions={}

data.forEach(d=>{

if(!regions[d.Region]) regions[d.Region]=0
regions[d.Region]+=Number(d.Units_Sold)

})

Plotly.newPlot("regionalSales",[{

x:Object.keys(regions),
y:Object.values(regions),
type:"bar"

}],{title:"Regional Sales"})

}

function topModels(data){

let models={}

data.forEach(d=>{

if(!models[d.Model]) models[d.Model]=0
models[d.Model]+=Number(d.Units_Sold)

})

let sorted=Object.entries(models)
.sort((a,b)=>b[1]-a[1])
.slice(0,10)

Plotly.newPlot("topModels",[{

x:sorted.map(d=>d[0]),
y:sorted.map(d=>d[1]),
type:"bar"

}],{title:"Top Models"})

}

</script>

</body>
</html>
